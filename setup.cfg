[pycodestyle]
max-line-length = 79
# Keep pycodestyle's default ignores, plus:
#   E203: slice colon spacing — conflicts with black's formatting.
#   E402: a few modules must set os.environ before importing torch/llama-cpp
#         (OpenMP runtime conflict), so their imports intentionally are not
#         at the very top.
ignore = E121,E123,E126,E226,E24,E704,W503,W504,E203,E402
