name: release-please

# Keeps a "release PR" open on main that accumulates the changelog and the
# next version (from Conventional Commits). Merge that PR to cut a release:
# release-please then creates the git tag and the GitHub Release.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
